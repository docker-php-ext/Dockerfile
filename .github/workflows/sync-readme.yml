name: Sync README to Docker Hub

on:
  push:
    branches: [ "main" ]
    paths:
      - "README.md"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extension: [bcmath, calendar, exif, gd, gettext, gmp, grpc, igbinary, imagick, imap, intl, ldap, memcache, memcached, mongodb, msgpack, mysqli, opcache, pcntl, pcov, pdo_mysql, pdo_pgsql, protobuf, redis, sockets, sodium, uuid, xdebug, xmlrpc, xsl, yaml, zip]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare README for extension
        run: |
          sed "s/ \`gd\`/ \`${{ matrix.extension }}\`/g; s/dockerphpext\/gd/dockerphpext\/${{ matrix.extension }}/g" README.md > README-${{ matrix.extension }}.md

      - name: Update Docker Hub descriptions
        uses: peter-evans/dockerhub-description@v4
        with:
          username: dockerphpext
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: dockerphpext/${{ matrix.extension }}
          readme-filepath: README-${{ matrix.extension }}.md
