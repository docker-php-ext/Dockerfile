name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      extensions:
        description: 'PHP extensions, comma-separated (eg: bcmath,intl,redis)'
        required: true
        type: string
      versions:
        description: 'PHP versions, comma-separated (eg: 8.1,8.2,8.3)'
        required: true
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      matrix: ${{ steps.set-list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-list
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Parse comma-separated extensions and versions, generate cross-product matrix
            JSON_RESULT=$(python3 .github/scripts/generate-matrix.py \
              "${{ inputs.extensions }}" \
              "${{ inputs.versions }}")
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then
              BASE_REF="origin/main"
            else
              BASE_REF="origin/$BASE_REF"
            fi

            JSON_RESULT=$(git diff --name-only $BASE_REF HEAD | \
              grep '^extensions/' | \
              awk -F'/' '{print $2":"$3}' | \
              sort | uniq | \
              jq -R -s -c 'split("\n") | map(select(length > 0) | split(":")) | map({extension: .[0], version: .[1]})')
          fi

          if [ -z "$JSON_RESULT" ] || [ "$JSON_RESULT" == "[]" ]; then
            echo "No changes detected in extensions."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$JSON_RESULT" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    permissions:
      contents: read
      packages: write
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      DH_IMAGE: dockerphpext/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Extension Builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions/${{ matrix.extension }}/${{ matrix.version }}/Dockerfile.alpine
          load: true
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}

      - name: Build Extension
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions//Dockerfile
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.version }}
            EXTENSION=${{ matrix.extension }}
            DISTRO=alpine
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}

      - name: Run tests against GHCR image
        run: |
          docker run --rm \
            -v $(pwd)/tests/test.php:/opt/php/tests/test.php \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }} \
            php /opt/php/tests/test.php ${{ matrix.extension }}
          
          if docker run --rm ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }} \
            php -m 2>&1 | grep -Eqi 'Unable|Warning'; then
            echo "❌ PHP extension load failed"
            exit 1
          fi
          
          echo "✅ Extension ${{ matrix.extension }} loaded successfully"
