name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      extensions:
        description: 'PHP extensions, comma-separated (eg: bcmath,intl,redis)'
        required: true
        type: string
      versions:
        description: 'PHP versions, comma-separated (eg: 8.1,8.2,8.3)'
        required: true
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      matrix: ${{ steps.set-list.outputs.matrix }}
      matrix_base: ${{ steps.set-list.outputs.matrix_base }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-list
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            JSON_RESULT=$(python3 .github/scripts/generate-matrix.py \
              "${{ inputs.extensions }}" \
              "${{ inputs.versions }}")
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then
              BASE_REF="origin/main"
            else
              BASE_REF="origin/$BASE_REF"
            fi

            JSON_RESULT=$(git diff --name-only $BASE_REF HEAD | \
              grep '^extensions/' | \
              awk -F'/' '{print $2":"$3}' | \
              sort | uniq | \
              jq -R -s -c 'split("\n") | map(select(length > 0) | split(":")) | map({extension: .[0], version: .[1]})')
          fi

          if [ -z "$JSON_RESULT" ] || [ "$JSON_RESULT" == "[]" ]; then
            echo "No changes detected in extensions."
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "matrix_base=[]" >> $GITHUB_OUTPUT
          else
            FILTERED=$(echo "$JSON_RESULT" | jq -c '.[]' | while read -r entry; do
              EXT=$(echo "$entry" | jq -r '.extension')
              VER=$(echo "$entry" | jq -r '.version')
              if [ -f "extensions/$EXT/$VER/Dockerfile.alpine" ]; then
                echo "$entry"
              fi
            done | jq -sc '.')

            MATRIX=$(echo "$FILTERED" | jq -c '[.[] | . as $e | ["amd64","arm64"] | .[] | {extension: $e.extension, version: $e.version, platform: .}]')

            echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT
            echo "matrix_base=${FILTERED}" >> $GITHUB_OUTPUT
          fi

  build-platform:
    permissions:
      contents: read
      packages: write
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Extension Builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions/${{ matrix.extension }}/${{ matrix.version }}/Dockerfile.alpine
          push: true
          platforms: linux/${{ matrix.platform }}
          tags: ${{ env.GHCR_IMAGE }}:builder-${{ env.TAG }}-${{ env.SHORT_SHA }}-${{ matrix.platform }}

      - name: Build Extension
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions/Dockerfile
          push: true
          platforms: linux/${{ matrix.platform }}
          build-args: |
            PHP_VERSION=${{ matrix.version }}
            DISTRO=alpine
            BUILDER_IMAGE=${{ env.GHCR_IMAGE }}:builder-${{ env.TAG }}-${{ env.SHORT_SHA }}-${{ matrix.platform }}
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}-${{ matrix.platform }}

      - name: Run tests
        run: |
          docker run --rm \
            -v $(pwd)/tests/test.php:/opt/php/tests/test.php \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}-${{ matrix.platform }} \
            php /opt/php/tests/test.php ${{ matrix.extension }}

          if docker run --rm ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}-${{ matrix.platform }} \
            php -m 2>&1 | grep -Eqi 'Unable|Warning'; then
            echo "❌ PHP extension load failed"
            exit 1
          fi

          echo "✅ Extension ${{ matrix.extension }} loaded successfully on ${{ matrix.platform }}"

  merge-manifest:
    permissions:
      contents: read
      packages: write
    needs: [detect, build-platform]
    if: needs.detect.outputs.matrix_base != '[]' && needs.detect.outputs.matrix_base != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix_base) }}
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }} \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}-amd64 \
            ${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ env.SHORT_SHA }}-arm64
