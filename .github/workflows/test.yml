name: Build and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      extensions:
        description: 'PHP extensions, comma-separated (eg: bcmath,intl,redis)'
        required: true
        type: string
      versions:
        description: 'PHP versions, comma-separated (eg: 8.1,8.2,8.3)'
        required: true
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-list
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Parse comma-separated extensions and versions, generate cross-product matrix
            JSON_RESULT=$(python3 -c "
              import json, itertools
              exts = [e.strip() for e in '${{ inputs.extensions }}'.split(',') if e.strip()]
              vers = [v.strip() for v in '${{ inputs.versions }}'.split(',') if v.strip()]
              matrix = [{'extension': e, 'version': v} for e, v in itertools.product(exts, vers)]
              print(json.dumps(matrix))
            ")
          else
            BASE_REF="${{ github.base_ref }}"
            if [ -z "$BASE_REF" ]; then
              BASE_REF="origin/main"
            else
              BASE_REF="origin/$BASE_REF"
            fi

            JSON_RESULT=$(git diff --name-only $BASE_REF HEAD | \
              grep '^extensions/' | \
              awk -F'/' '{print $2":"$3}' | \
              sort | uniq | \
              jq -R -s -c 'split("\n") | map(select(length > 0) | split(":")) | map({extension: .[0], version: .[1]})')
          fi

          if [ -z "$JSON_RESULT" ] || [ "$JSON_RESULT" == "[]" ]; then
            echo "No changes detected in extensions."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$JSON_RESULT" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      DH_IMAGE: dockerphpext/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Extension Builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions/${{ matrix.extension }}/${{ matrix.version }}/Dockerfile.alpine
          load: true
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:cache-${{ env.TAG }}
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:cache-${{ env.TAG }},mode=max
                      
      - name: Build Extension
        uses: docker/build-push-action@v6
        with:
          context: .
          file: extensions/${{ matrix.extension }}/Dockerfile
          push: true
          build-args: 
            PHP_VERSION=${{ matrix.version }}
            EXTENSION=${{ matrix.extension }}
            DISTRO=alpine
          tags: ${{ env.GHCR_IMAGE }}:${{ env.TAG }}
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:cache-${{ env.TAG }}
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:cache-${{ env.TAG }},mode=max

      - name: Run tests against GHCR image
        run: |
          make run-single-test \
            extension=${{ matrix.extension }} \
            php_version=${{ matrix.version }}
