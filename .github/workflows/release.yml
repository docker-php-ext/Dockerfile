name: Release to Docker Hub

on:
  release:
    types: [published]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-list
        run: |
          # On release, publish everything under extensions/
          JSON_RESULT=$(find extensions -name 'Dockerfile.alpine' | \
            awk -F'/' '{print $2":"$3}' | \
            sort | uniq | \
            jq -R -s -c 'split("\n") | map(select(length > 0) | split(":")) | map({extension: .[0], version: .[1]})')

          if [ -z "$JSON_RESULT" ] || [ "$JSON_RESULT" == "[]" ]; then
            echo "No extensions found."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$JSON_RESULT" >> $GITHUB_OUTPUT
          fi

  release:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      DH_IMAGE: dockerphpext/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dockerphpext
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Verify GHCR image exists
        id: check
        run: |
          docker manifest inspect "${{ env.GHCR_IMAGE }}:${{ env.TAG }}" \
            && echo "exists=true" >> $GITHUB_OUTPUT \
            || echo "exists=false" >> $GITHUB_OUTPUT

      # Image already built & tested in CI — just promote it, no rebuild
      - name: Promote GHCR image to Docker Hub
        if: steps.check.outputs.exists == 'true'
        run: |
          docker buildx imagetools create \
            --tag "${{ env.DH_IMAGE }}:${{ env.TAG }}" \
            --tag "${{ env.DH_IMAGE }}:${{ github.ref_name }}-${{ env.TAG }}" \
            "${{ env.GHCR_IMAGE }}:${{ env.TAG }}"
