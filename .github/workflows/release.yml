name: Release to Docker Hub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      extensions:
        description: 'PHP extensions, comma-separated (eg: bcmath,intl,redis)'
        required: true
        type: string
      versions:
        description: 'PHP versions, comma-separated (eg: 8.1,8.2,8.3)'
        required: true
        type: string
      sha:
        description: 'SHA of the release'
        required: true
        type: string

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-list.outputs.matrix }}
      sha: ${{ steps.short-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-list
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Parse comma-separated extensions and versions, generate cross-product matrix
            JSON_RESULT=$(python3 .github/scripts/generate-matrix.py \
              "${{ inputs.extensions }}" \
              "${{ inputs.versions }}")
          else
            # On release, publish everything under extensions/
            JSON_RESULT=$(find extensions -name 'Dockerfile.alpine' | \
              awk -F'/' '{print $2":"$3}' | \
              sort | uniq | \
              jq -R -s -c 'split("\n") | map(select(length > 0) | split(":")) | map({extension: .[0], version: .[1]})')
          fi
          
          if [ -z "$JSON_RESULT" ] || [ "$JSON_RESULT" == "[]" ]; then
            echo "No extensions found."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$JSON_RESULT" >> $GITHUB_OUTPUT
          fi
      
      - id: short-sha
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHA="${{ inputs.sha }}"
          else
            SHA="${GITHUB_SHA}"
          fi
          echo "sha=${SHA::7}" >> $GITHUB_OUTPUT
  release:
    needs: detect
    if: needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != ''
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest

    env:
      GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.extension }}
      DH_IMAGE: dockerphpext/${{ matrix.extension }}
      TAG: php${{ matrix.version }}-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: dockerphpext
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Verify GHCR image exists
        id: check
        run: |
          docker manifest inspect "${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ needs.detect.outputs.sha }}" \
            && echo "exists=true" >> $GITHUB_OUTPUT \
            || echo "exists=false" >> $GITHUB_OUTPUT

      # Image already built & tested in CI — just promote it, no rebuild
      - name: Promote GHCR image to Docker Hub
        if: steps.check.outputs.exists == 'true'
        run: |
          docker buildx imagetools create \
            --tag "${{ env.DH_IMAGE }}:${{ env.TAG }}" \
            "${{ env.GHCR_IMAGE }}:${{ env.TAG }}-${{ needs.detect.outputs.sha }}"
